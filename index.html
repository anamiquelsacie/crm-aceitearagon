<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Aceite Aragón · CRM</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/estilos.css?v=27">
</head>
<body>

  <!-- ===== Topbar ===== -->
  <div class="topbar">
    <div class="brand">
      <div class="mark"><span>A</span></div>
      <div>
        <h1>Aceite Aragón · CRM</h1>
        <p>Gestión de clientes B2B</p>
      </div>
    </div>
    <div class="top-actions">
      <button class="btn btn-ghost" id="btnAlta">＋ Alta rápida</button>
      <button class="btn btn-primary" id="btnNuevo">＋ Nuevo cliente</button>
      <div class="user-chip" id="userChip" title="Cerrar sesión">··</div>
    </div>
  </div>

  <div class="wrap">
    <!-- ===== Pestañas ===== -->
    <div class="tabs">
      <button class="tab activo" data-tab="clientes">Clientes</button>
      <button class="tab" data-tab="mapa">Mapa</button>
      <button class="tab" data-tab="plantillas">Plantillas</button>
      <button class="tab" data-tab="agenda">Agenda</button>
      <button class="tab" data-tab="analisis">Análisis</button>
    </div>

    <!-- ===== Vista CLIENTES ===== -->
    <div id="vista-clientes">
      <div class="page-head">
        <div>
          <h2>Cartera de clientes</h2>
          <div class="sub">Foto global y seguimiento de cada cliente</div>
        </div>
        <div class="sub" id="contadorTotal"></div>
      </div>

      <!-- Resumen / KPIs -->
      <div class="resumen" id="resumen"></div>
      <div class="mini-row" id="miniRow"></div>

      <!-- Toolbar filtros -->
      <div class="toolbar">
        <div class="search">🔍 <input id="buscar" placeholder="Buscar empresa, contacto, ciudad…"></div>
        <select class="filtro" id="fPais"><option value="">🌍 Todos los países</option></select>
        <select class="filtro" id="fEstado"><option value="">◆ Todos los estados</option></select>
        <select class="filtro" id="fCanal"><option value="">🏷 Todos los canales</option></select>
        <button class="filtro" id="fAlerta">⚠ Solo con alerta</button>
        <button class="filtro" id="btnPapelera" title="Ver clientes archivados">🗑 Papelera</button>
      </div>

      <!-- Tabla -->
      <div class="tabla-card">
        <div class="tabla-scroll">
          <table>
            <thead>
              <tr>
                <th data-orden="empresa">Empresa <span class="ar">▾</span></th>
                <th class="col-hide" data-orden="canal">Canal</th>
                <th data-orden="pais">País / mercado</th>
                <th data-orden="estado">Estado</th>
                <th class="col-hide" data-orden="prioridad">Prioridad</th>
                <th class="col-hide" data-orden="ultima">Última interacción</th>
                <th class="col-hide">Próxima acción</th>
                <th>⚠</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ===== Vista MAPA ===== -->
    <div id="vista-mapa" class="oculto">
      <div class="mapa-cabecera" id="mapaCabecera"></div>
      <div id="mapaCanvas"></div>
    </div>

    <!-- ===== Vista PLANTILLAS ===== -->
    <div id="vista-plantillas" class="oculto"></div>

    <!-- ===== Vista AGENDA ===== -->
    <div id="vista-agenda" class="oculto"></div>

    <!-- ===== Vista ANÁLISIS ===== -->
    <div id="vista-analisis" class="oculto"></div>
  </div>

  <!-- ===== Modal ficha (se rellena por JS) ===== -->
  <div id="modal"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/app.js?v=27"></script>
</body>
</html>
